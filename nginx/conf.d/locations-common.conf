root /usr/share/nginx/html;
index index.html;
client_max_body_size 1m;

add_header X-Frame-Options DENY always;
add_header X-Content-Type-Options nosniff always;
add_header Referrer-Policy no-referrer always;
add_header Cross-Origin-Opener-Policy same-origin always;
add_header Cross-Origin-Resource-Policy same-site always;
add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https: http: blob:; img-src 'self' data:; media-src 'self' blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

location /.well-known/acme-challenge/ {
    root /var/www/certbot;
}

location /internal/ {
    return 403;
}

location = /health {
    set $backend_upstream http://backend:8000;
    proxy_pass $backend_upstream/health;
    include /etc/nginx/conf.d/proxy-common.conf;
}

location = /health/live {
    set $backend_upstream http://backend:8000;
    proxy_pass $backend_upstream/health/live;
    include /etc/nginx/conf.d/proxy-common.conf;
}

location = /health/ready {
    set $backend_upstream http://backend:8000;
    proxy_pass $backend_upstream/health/ready;
    include /etc/nginx/conf.d/proxy-common.conf;
}

location = /api/v1/enroll {
    limit_req zone=enroll_limit burst=10 nodelay;
    set $backend_upstream http://backend:8000;
    proxy_pass $backend_upstream;
    include /etc/nginx/conf.d/proxy-common.conf;
}

location = /api/v1/viewer/session {
    limit_req zone=viewer_session_limit burst=20 nodelay;
    set $backend_upstream http://backend:8000;
    proxy_pass $backend_upstream;
    include /etc/nginx/conf.d/proxy-common.conf;
}

location ~ ^/api/v1/viewer/streams/[0-9]+/playback-session$ {
    limit_req zone=playback_session_limit burst=30 nodelay;
    set $backend_upstream http://backend:8000;
    proxy_pass $backend_upstream;
    include /etc/nginx/conf.d/proxy-common.conf;
}

location /api/ {
    set $backend_upstream http://backend:8000;
    proxy_pass $backend_upstream;
    include /etc/nginx/conf.d/proxy-common.conf;
}

location /webrtc/ {
    resolver 127.0.0.11 ipv6=off valid=10s;
    set $mediamtx_upstream mediamtx:8889;
    rewrite ^/webrtc/(.*)$ /$1 break;
    proxy_pass http://$mediamtx_upstream;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_set_header Host $host;
    proxy_set_header Connection "";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
}

location / {
    try_files $uri $uri/ /index.html;
}
