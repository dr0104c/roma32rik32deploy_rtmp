worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    resolver 127.0.0.11 ipv6=off;
    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /dev/stdout main;
    error_log /dev/stderr warn;

    limit_req_zone $binary_remote_addr zone=enroll_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=viewer_session_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=playback_session_limit:10m rate=30r/m;

    include /etc/nginx/conf.d/active.conf;
}
